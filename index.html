<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クラウドメモ（Supabase）</title>
<style>
  :root{
    --bg:#f4f6f8; --card:#fff; --ink:#1c2733; --muted:#7a8896;
    --accent:#3ecf8e; --accent-d:#2bb377; --line:#e3e8ec; --danger:#e06a5a;
  }
  *{box-sizing:border-box}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
    display:flex;justify-content:center;padding:24px 16px;
  }
  .wrap{width:100%;max-width:480px}
  h1{font-size:20px;margin:0 0 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:14px}
  label{display:block;font-size:13px;color:var(--muted);margin:0 0 4px}
  input,textarea{
    width:100%;font-family:inherit;font-size:15px;
    padding:11px 13px;border:1px solid var(--line);border-radius:9px;
    margin-bottom:12px;background:#fff;color:var(--ink);
  }
  textarea{resize:vertical;min-height:62px}
  button{
    font-family:inherit;font-size:15px;cursor:pointer;
    padding:11px 18px;border-radius:9px;border:none;
    background:var(--accent);color:#06281b;font-weight:700;transition:.15s;
  }
  button:hover{background:var(--accent-d)}
  button.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);font-weight:400}
  button.link{background:none;color:var(--accent-d);padding:4px;font-weight:600}
  button.del{background:none;color:var(--danger);font-size:13px;padding:4px 8px;font-weight:400}
  .row{display:flex;gap:8px;align-items:center}
  .row button{flex:0 0 auto}
  .who{font-size:13px;color:var(--muted)}
  .memo{
    background:var(--card);border:1px solid var(--line);border-radius:11px;
    padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;gap:12px;align-items:flex-start;
  }
  .memo p{margin:0;white-space:pre-wrap;word-break:break-word;flex:1}
  .memo time{display:block;font-size:11px;color:var(--muted);margin-top:6px}
  .msg{font-size:13px;min-height:18px;margin:0 0 10px}
  .msg.err{color:var(--danger)}
  .msg.ok{color:var(--accent-d)}
  .empty{color:var(--muted);text-align:center;padding:20px;font-size:14px}
  .tab{display:flex;gap:6px;margin-bottom:14px}
  .tab button{flex:1;background:#eef1f3;color:var(--muted);font-weight:400}
  .tab button.on{background:var(--accent);color:#06281b;font-weight:700}
  .hide{display:none}
  .setup{font-size:13px;line-height:1.7;color:var(--muted);background:#fff7ed;border:1px solid #ffe2bd;border-radius:11px;padding:14px 16px}
  code{background:#eef1f3;padding:1px 5px;border-radius:4px;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <h1>📝 クラウドメモ</h1>

  <!-- 設定がまだの時の案内 -->
  <div id="setup" class="setup hide">
    最初に、このHTMLの <code>&lt;script&gt;</code> 内の
    <code>SUPABASE_URL</code> と <code>SUPABASE_KEY</code> を、
    自分のSupabaseプロジェクトの値に書き換えてください。
  </div>

  <!-- ログイン前 -->
  <div id="auth" class="card hide">
    <div class="tab">
      <button id="tabLogin" class="on" onclick="setMode('login')">ログイン</button>
      <button id="tabSignup" onclick="setMode('signup')">新規登録</button>
    </div>
    <p id="authMsg" class="msg"></p>
    <label>メールアドレス</label>
    <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
    <label>パスワード</label>
    <input id="password" type="password" placeholder="6文字以上" autocomplete="current-password">
    <button id="authBtn" onclick="doAuth()" style="width:100%">ログイン</button>
  </div>

  <!-- ログイン後 -->
  <div id="app" class="hide">
    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:14px">
        <span class="who" id="who"></span>
        <button class="ghost" onclick="signOut()">ログアウト</button>
      </div>
      <p id="appMsg" class="msg"></p>
      <textarea id="memoInput" placeholder="メモを入力…"></textarea>
      <button onclick="addMemo()" style="width:100%">保存する</button>
    </div>
    <div id="list"></div>
  </div>
</div>

<!-- Supabaseの公式ライブラリを読み込む -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   ① ここに自分のSupabaseの値を貼る（Project Settings → API）
   ============================================================ */
const SUPABASE_URL = "https://YOUR-PROJECT.supabase.co";
const SUPABASE_KEY = "YOUR-ANON-PUBLIC-KEY";

/* ====== 初期化 ====== */
let sb = null;
const notConfigured = SUPABASE_URL.includes("YOUR-PROJECT");

if (notConfigured) {
  document.getElementById("setup").classList.remove("hide");
} else {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  document.getElementById("auth").classList.remove("hide");
  checkSession();   // すでにログイン済みなら自動でアプリ画面へ
}

let mode = "login";
function setMode(m){
  mode = m;
  document.getElementById("tabLogin").classList.toggle("on", m==="login");
  document.getElementById("tabSignup").classList.toggle("on", m==="signup");
  document.getElementById("authBtn").textContent = m==="login" ? "ログイン" : "登録する";
  setMsg("authMsg","");
}

function setMsg(id, text, type=""){
  const el=document.getElementById(id);
  el.textContent=text; el.className="msg"+(type?" "+type:"");
}

/* ====== 認証（ログイン / 新規登録） ====== */
async function doAuth(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  if(!email || !password){ setMsg("authMsg","メールとパスワードを入力してください","err"); return; }

  setMsg("authMsg","処理中…");
  // mode に応じて signUp か signInWithPassword を呼ぶ
  const fn = mode==="signup"
    ? sb.auth.signUp({ email, password })
    : sb.auth.signInWithPassword({ email, password });
  const { data, error } = await fn;

  if(error){ setMsg("authMsg", error.message, "err"); return; }
  if(mode==="signup" && !data.session){
    setMsg("authMsg","登録しました。確認メールをオフにしていればそのままログインできます。","ok");
    return;
  }
  showApp();
}

/* ====== セッション確認 ====== */
async function checkSession(){
  const { data } = await sb.auth.getSession();
  if(data.session) showApp();
}

async function showApp(){
  const { data } = await sb.auth.getUser();
  document.getElementById("auth").classList.add("hide");
  document.getElementById("app").classList.remove("hide");
  document.getElementById("who").textContent = "ログイン中：" + data.user.email;
  loadMemos();
}

async function signOut(){
  await sb.auth.signOut();
  location.reload();
}

/* ====== メモ：読み込み（自分の行だけ返る＝RLSのおかげ） ====== */
async function loadMemos(){
  const { data, error } = await sb
    .from("memos")
    .select("*")
    .order("created_at", { ascending:false });

  const list = document.getElementById("list");
  if(error){ setMsg("appMsg", error.message, "err"); return; }
  if(!data.length){ list.innerHTML='<p class="empty">まだメモはありません</p>'; return; }

  list.innerHTML = data.map(m => `
    <div class="memo">
      <div>
        <p>${escapeHtml(m.content)}</p>
        <time>${new Date(m.created_at).toLocaleString("ja-JP")}</time>
      </div>
      <button class="del" onclick="delMemo('${m.id}')">削除</button>
    </div>`).join("");
}

/* ====== メモ：追加 ====== */
async function addMemo(){
  const ta = document.getElementById("memoInput");
  const content = ta.value.trim();
  if(!content) return;

  // user_id はDB側の default auth.uid() が自動で入れてくれる
  const { error } = await sb.from("memos").insert({ content });
  if(error){ setMsg("appMsg", error.message, "err"); return; }

  ta.value="";
  setMsg("appMsg","保存しました","ok");
  loadMemos();
}

/* ====== メモ：削除 ====== */
async function delMemo(id){
  const { error } = await sb.from("memos").delete().eq("id", id);
  if(error){ setMsg("appMsg", error.message, "err"); return; }
  loadMemos();
}

/* XSS対策：入力をそのままHTMLに入れない */
function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]
  ));
}
</script>
</body>
</html>
